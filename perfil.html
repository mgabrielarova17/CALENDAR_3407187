<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil de Samuel Techton - Borde Reducido</title>
    <style>
        
        body {
            background-color: #5d35b0; 
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        
        .card-border {
            width: 320px;
            background-color: #ff9e4d; 
            padding: 6px; 
            border-radius: 25px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        
        .card-inner {
            background-color: #c0c0c0; 
            border-radius: 18px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .profile-img {
            width: 100%;
            height: 220px;
            object-fit: cover;
            display: block;
        }

        
        .info-box {
            background-color: #4a4a4a; 
            padding: 25px 20px;
            text-align: center;
            border-radius: 20px 20px 0 0; 
            margin-top: -25px; 
            z-index: 1;
        }

        .name {
            color: #fbd38d; 
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 15px;
            display: block;
        }

        .description {
            color: white;
            font-size: 14px;
            line-height: 1.5;
            margin-bottom: 25px;
        }

        .follow-btn {
            background-color: #ff9e4d;
            color: white;
            border: none;
            padding: 10px 35px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        .follow-btn:hover {
            background-color: #e68a3d;
        }

    </style>
</head>
<body>

    <div class="card-border">
        <div class="card-inner">
            <img src="bts_come_back.jpg" alt="Samuel Techton" class="profile-img">
            
            <div class="info-box">
                <span class="name">Samuel Techton</span>
                <p class="description">
                    Software engineer with a knack for problem-solving, I thrive on coding challenges and crafting elegant solutions.
                </p>
                <button class="follow-btn">Follow</button>
            </div>
        </div>
    </div>

</body>
</html>
